<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
    font-family: Roboto, Helvetica, Arial, sans-serif; color: #333; }
  #wrap { display: flex; flex-direction: column; width: 100%; height: 100%; }
  #chart-area { flex: 1 1 auto; position: relative; min-height: 0; }
  #c { display: block; width: 100%; height: 100%; }
  #legend {
    flex: 0 0 auto; height: 22px; line-height: 22px;
    padding: 2px 8px; font-size: 11px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    border-top: 1px solid #eee; background: #fafafa;
  }
  #legend .item { display: inline-block; margin-right: 14px; }
  #legend .sw {
    display: inline-block; width: 12px; height: 8px; vertical-align: middle;
    margin-right: 5px; border-radius: 2px;
  }
  #tip {
    position: absolute; pointer-events: none; display: none;
    background: rgba(255,255,255,0.97); border: 1px solid #ccc;
    border-radius: 3px; padding: 5px 7px; font-size: 11px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12); z-index: 2; min-width: 120px;
  }
  #tip .t { font-weight: 600; margin-bottom: 3px; color: #555; }
  #tip .row { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
  #tip .sw { width: 10px; height: 8px; border-radius: 2px; flex: 0 0 auto; }
  #tip .nm { color: #333; flex: 1 1 auto; }
  #tip .vl { font-variant-numeric: tabular-nums; color: #111; font-weight: 500; }
  #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="chart-area">
    <canvas id="c"></canvas>
    <div id="tip"></div>
    <div id="msg" style="display:none"></div>
  </div>
  <div id="legend"></div>
</div>
<script>
(function () {
  const PAD = { top: 12, right: 16, bottom: 28, left: 56 };

  const state = {
    data: null,
    geom: null,     // { plotL, plotR, plotT, plotB, tf, tt, span, yMin, yMax }
    base: null,     // offscreen canvas with the static chart
    cssW: 0, cssH: 0
  };

  function readData() {
    try {
      const h = window.location.hash.substring(1);
      if (!h) return null;
      return JSON.parse(decodeURIComponent(h));
    } catch (e) { return null; }
  }

  function fmtTime(ts, span) {
    const d = new Date(ts * 1000);
    const pad = (n) => String(n).padStart(2, '0');
    if (span < 86400) return pad(d.getHours()) + ':' + pad(d.getMinutes());
    if (span <= 7 * 86400) {
      return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + ' ' +
        pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    return pad(d.getDate()) + '/' + pad(d.getMonth() + 1);
  }

  function fmtFull(ts) {
    const d = new Date(ts * 1000);
    const pad = (n) => String(n).padStart(2, '0');
    return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear()
      + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function fmtValue(v, isInt) {
    if (v === null || v === undefined) return '';
    const a = Math.abs(v);
    if (isInt) {
      if (a >= 1000000) return (v / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (a >= 1000) return (v / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(Math.round(v));
    }
    if (a >= 1000000) return (v / 1000000).toFixed(2) + 'M';
    if (a >= 1000) return (v / 1000).toFixed(2) + 'k';
    if (a >= 1) return v.toFixed(2);
    if (a >= 0.01) return v.toFixed(3);
    if (a === 0) return '0';
    return v.toExponential(1);
  }

  function fmtUnit(units) {
    if (!units) return '';
    // Tight spacing for "%", normal for word units like "B", "Mbps".
    return units === '%' ? units : ' ' + units;
  }

  function niceTicks(min, max, count) {
    if (min === max) { min -= 1; max += 1; }
    const range = max - min;
    const rawStep = range / count;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const norm = rawStep / mag;
    let step;
    if (norm < 1.5) step = mag;
    else if (norm < 3) step = 2 * mag;
    else if (norm < 7) step = 5 * mag;
    else step = 10 * mag;
    const niceMin = Math.floor(min / step) * step;
    const niceMax = Math.ceil(max / step) * step;
    const ticks = [];
    for (let v = niceMin; v <= niceMax + step / 2; v += step) ticks.push(v);
    return { min: niceMin, max: niceMax, ticks };
  }

  function hexToRgb(hex) {
    const m = hex.replace('#', '');
    const n = parseInt(m, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function findNearest(points, t) {
    if (!points.length) return -1;
    let lo = 0, hi = points.length - 1;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (points[mid][0] < t) lo = mid + 1;
      else hi = mid;
    }
    if (lo > 0 && (t - points[lo - 1][0]) <= (points[lo][0] - t)) return lo - 1;
    return lo;
  }

  function buildLegend(data) {
    const el = document.getElementById('legend');
    if (!data.series || !data.series.length) { el.innerHTML = ''; return; }
    el.innerHTML = data.series.map(s =>
      '<span class="item"><span class="sw" style="background:' + s.color + '"></span>'
      + escapeHtml(s.name) + '</span>'
    ).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function renderBase() {
    const canvas = document.getElementById('c');
    const msg = document.getElementById('msg');
    const data = state.data;

    if (!data) { msg.style.display = 'block'; msg.textContent = 'No data'; return; }
    if (data.error) { msg.style.display = 'block'; msg.textContent = data.error; return; }
    if (!data.series || data.series.length === 0) {
      msg.style.display = 'block';
      msg.textContent = 'No history data in selected period.';
      return;
    }
    msg.style.display = 'none';

    const dpr = window.devicePixelRatio || 1;
    const W = canvas.clientWidth;
    const H = canvas.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    state.cssW = W; state.cssH = H;

    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const plotL = PAD.left, plotT = PAD.top;
    const plotR = W - PAD.right, plotB = H - PAD.bottom;
    const plotW = plotR - plotL, plotH = plotB - plotT;
    if (plotW <= 10 || plotH <= 10) return;

    const tf = data.time_from, tt = data.time_to, span = tt - tf;
    const yInfo = niceTicks(
      data.y_min !== null ? data.y_min : 0,
      data.y_max !== null ? data.y_max : 1,
      5
    );

    const xScale = (t) => plotL + ((t - tf) / Math.max(1, span)) * plotW;
    const yScale = (v) => plotB - ((v - yInfo.min) / Math.max(1e-9, yInfo.max - yInfo.min)) * plotH;

    state.geom = { plotL, plotR, plotT, plotB, tf, tt, span, yInfo, xScale, yScale };

    // Non-business shading
    if (data.non_business && data.non_business.length) {
      ctx.fillStyle = 'rgba(200,200,200,0.35)';
      for (const seg of data.non_business) {
        const x1 = Math.max(plotL, xScale(seg[0]));
        const x2 = Math.min(plotR, xScale(seg[1]));
        if (x2 > x1) ctx.fillRect(x1, plotT, x2 - x1, plotH);
      }
    }

    // Y grid + labels
    ctx.strokeStyle = '#e4e4e4';
    ctx.fillStyle = '#666';
    ctx.font = '11px Roboto, Helvetica, Arial, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 1;
    for (const v of yInfo.ticks) {
      const y = yScale(v);
      ctx.beginPath();
      ctx.moveTo(plotL, y); ctx.lineTo(plotR, y);
      ctx.stroke();
      ctx.fillText(fmtValue(v, data.is_integer), plotL - 6, y);
    }

    if (data.units) {
      ctx.fillStyle = '#888';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.font = '10px Roboto, Helvetica, Arial, sans-serif';
      ctx.fillText(data.units, plotL + 4, plotT - 1);
      ctx.font = '11px Roboto, Helvetica, Arial, sans-serif';
    }

    // X axis ticks
    const xTickCount = Math.max(2, Math.min(8, Math.floor(plotW / 90)));
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let i = 0; i <= xTickCount; i++) {
      const t = tf + (span * i) / xTickCount;
      const x = xScale(t);
      ctx.strokeStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(x, plotT); ctx.lineTo(x, plotB);
      ctx.stroke();
      ctx.fillStyle = '#666';
      ctx.fillText(fmtTime(t, span), x, plotB + 6);
    }

    // Frame
    ctx.strokeStyle = '#bbb';
    ctx.strokeRect(plotL, plotT, plotW, plotH);

    const stroke = (data.line_thickness || 0) * 0.6;
    const fillA = (data.fill_intensity || 0) * 0.07;

    const bandA = Math.min(0.4, 0.15 + (data.fill_intensity || 0) * 0.025);

    for (const s of data.series) {
      if (!s.points.length) continue;
      const rgb = hexToRgb(s.color);
      const hasBand = s.points[0].length >= 4;

      if (fillA > 0) {
        ctx.beginPath();
        ctx.moveTo(xScale(s.points[0][0]), plotB);
        for (const p of s.points) ctx.lineTo(xScale(p[0]), yScale(p[1]));
        ctx.lineTo(xScale(s.points[s.points.length - 1][0]), plotB);
        ctx.closePath();
        ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + fillA + ')';
        ctx.fill();
      }

      if (hasBand) {
        let anyRange = false;
        for (const p of s.points) {
          if (p[3] > p[2]) { anyRange = true; break; }
        }
        if (anyRange) {
          ctx.beginPath();
          ctx.moveTo(xScale(s.points[0][0]), yScale(s.points[0][3]));
          for (let i = 1; i < s.points.length; i++) {
            ctx.lineTo(xScale(s.points[i][0]), yScale(s.points[i][3]));
          }
          for (let i = s.points.length - 1; i >= 0; i--) {
            ctx.lineTo(xScale(s.points[i][0]), yScale(s.points[i][2]));
          }
          ctx.closePath();
          ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + bandA + ')';
          ctx.fill();
        }
      }

      if (stroke > 0) {
        ctx.beginPath();
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = s.color;
        ctx.lineWidth = stroke;
        let started = false;
        for (const p of s.points) {
          const x = xScale(p[0]), y = yScale(p[1]);
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // Cache the base
    const off = document.createElement('canvas');
    off.width = canvas.width;
    off.height = canvas.height;
    off.getContext('2d').drawImage(canvas, 0, 0);
    state.base = off;
  }

  function drawOverlay(mouseX) {
    const canvas = document.getElementById('c');
    if (!state.base || !state.geom) return;

    const dpr = window.devicePixelRatio || 1;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(state.base, 0, 0);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (mouseX === null) { hideTip(); return; }

    const g = state.geom;
    const x = Math.max(g.plotL, Math.min(g.plotR, mouseX));
    const tMouse = g.tf + ((x - g.plotL) / (g.plotR - g.plotL)) * g.span;

    // Vertical crosshair
    ctx.strokeStyle = 'rgba(80,80,80,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(x, g.plotT); ctx.lineTo(x, g.plotB);
    ctx.stroke();
    ctx.setLineDash([]);

    // Per-series dots
    const rows = [];
    for (const s of state.data.series) {
      const i = findNearest(s.points, tMouse);
      if (i < 0) continue;
      const p = s.points[i];
      const px = g.xScale(p[0]);
      const py = g.yScale(p[1]);

      ctx.beginPath();
      ctx.fillStyle = s.color;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      rows.push({
        color: s.color,
        name: s.name,
        value: p[1],
        vmin: p.length >= 4 ? p[2] : null,
        vmax: p.length >= 4 ? p[3] : null,
        units: s.units || '',
        ts: p[0]
      });
    }

    showTip(mouseX, rows, tMouse);
  }

  function showTip(mouseX, rows, tMouse) {
    const tip = document.getElementById('tip');
    if (!rows.length) { tip.style.display = 'none'; return; }
    const header = '<div class="t">' + fmtFull(tMouse) + '</div>';
    const isInt = state.data && state.data.is_integer;
    const body = rows.map(r => {
      const unit = r.units ? ' ' + escapeHtml(r.units) : '';
      let val = fmtValue(r.value, isInt) + unit;
      if (r.vmin !== null && r.vmax !== null && r.vmax > r.vmin) {
        val += ' <span style="color:#888">(' + fmtValue(r.vmin, isInt) + '–' + fmtValue(r.vmax, isInt) + ')</span>';
      }
      return '<div class="row">'
        + '<span class="sw" style="background:' + r.color + '"></span>'
        + '<span class="nm">' + escapeHtml(r.name) + '</span>'
        + '<span class="vl">' + val + '</span>'
        + '</div>';
    }).join('');
    tip.innerHTML = header + body;
    tip.style.display = 'block';

    const area = document.getElementById('chart-area');
    const aw = area.clientWidth, ah = area.clientHeight;
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let left = mouseX + 14;
    if (left + tw > aw - 4) left = mouseX - tw - 14;
    let top = 8;
    if (state.geom) {
      top = Math.min(ah - th - 6, Math.max(6, state.geom.plotT + 4));
    }
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }

  function hideTip() {
    document.getElementById('tip').style.display = 'none';
  }

  let raf = null;
  function scheduleRender() {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      renderBase();
      drawOverlay(null);
    });
  }

  function init() {
    state.data = readData();
    buildLegend(state.data || { series: [] });
    scheduleRender();

    const area = document.getElementById('chart-area');
    area.addEventListener('mousemove', (e) => {
      if (!state.geom) return;
      const rect = area.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x < state.geom.plotL || x > state.geom.plotR) {
        drawOverlay(null);
        return;
      }
      drawOverlay(x);
    });
    area.addEventListener('mouseleave', () => drawOverlay(null));
  }

  window.addEventListener('resize', scheduleRender);
  if (window.ResizeObserver) {
    new ResizeObserver(scheduleRender).observe(document.body);
  }
  init();
})();
</script>
</body>
</html>
