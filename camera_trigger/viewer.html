<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Camera Trigger</title>
<style>
	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		background: #0e1012;
		color: #cfd9dd;
		font: 12px/1.4 Arial, sans-serif;
		overflow: hidden;
	}
	#wrap {
		display: flex;
		flex-direction: column;
		width: 100%;
		height: 100%;
		box-sizing: border-box;
	}
	#imgbox {
		position: relative;
		flex: 1 1 60%;
		min-height: 0;
		background: #000;
	}
	#frame {
		width: 100%;
		height: 100%;
		object-fit: contain;
		display: none;
	}
	#status {
		position: absolute;
		inset: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		color: #768d99;
		text-align: center;
		padding: 0 16px;
		box-sizing: border-box;
	}
	#status.error { color: #e45959; }
	#status.warn { color: #f2b34a; }
	#meta {
		flex: 0 0 auto;
		max-height: 40%;
		overflow: auto;
		padding: 6px 8px;
		border-top: 1px solid #2a2f34;
		background: #15181b;
	}
	#meta table { width: 100%; border-collapse: collapse; }
	#meta td { padding: 3px 6px; vertical-align: top; }
	#meta td.k { color: #768d99; white-space: nowrap; width: 1%; }
	#meta td.v { color: #e8eef1; word-break: break-all; }
	#meta td.v b { font-size: 15px; letter-spacing: 1px; }
	#bar {
		flex: 0 0 auto;
		display: flex;
		align-items: center;
		padding: 4px 8px;
		background: #15181b;
		border-top: 1px solid #2a2f34;
	}
	#stamp {
		color: #768d99;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	#stamp.warn { color: #f2b34a; }
	#stamp.error { color: #e45959; }
</style>
</head>
<body>
<div id="wrap">
	<div id="imgbox">
		<canvas id="frame"></canvas>
		<div id="status">Carregando&hellip;</div>
	</div>
	<div id="bar">
		<span id="stamp"></span>
	</div>
	<div id="meta"></div>
</div>
<script>
(() => {
	'use strict';

	let cfg;
	try {
		cfg = JSON.parse(decodeURIComponent(window.location.hash.substring(1)));
	}
	catch (e) {
		setStatus('Configuração inválida.', 'error');
		return;
	}

	const base = (cfg.base || '').replace(/\/+$/, '');
	const hostid = cfg.hostid || '';
	const timeoutMs = (parseInt(cfg.timeout, 10) || 15) * 1000;
	// viewer.html mora em modules/camera_trigger/ → ../../ = raiz da UI.
	const storeUrl = '../../zabbix.php?action=widget.camera_trigger.image&hostid=' + encodeURIComponent(hostid);

	const canvas = document.getElementById('frame');
	const ctx = canvas.getContext('2d');
	const status = document.getElementById('status');
	const stamp = document.getElementById('stamp');
	const meta = document.getElementById('meta');

	if (!base) {
		setStatus('URL base não informada.', 'error');
		return;
	}

	// Token JWT expira em ~1h — reaproveita entre capturas via sessionStorage.
	const tokenKey = 'itscam_token:' + base;
	let busy = false;
	let hasImage = false;

	function setStatus(msg, cls) {
		status.textContent = msg;
		status.className = cls || '';
		status.style.display = 'flex';
	}

	// Progresso: se já há imagem na tela, não cobre — escreve na barra inferior.
	function progress(msg, cls) {
		if (hasImage) {
			stamp.textContent = msg;
			stamp.className = cls || '';
		}
		else {
			setStatus(msg, cls);
		}
	}

	// fetch com timeout via AbortController.
	async function fetchT(url, opts, ms) {
		const ctrl = new AbortController();
		const t = setTimeout(() => ctrl.abort(), ms);
		try {
			return await fetch(url, Object.assign({signal: ctrl.signal}, opts));
		}
		finally {
			clearTimeout(t);
		}
	}

	async function login() {
		const r = await fetchT(base + '/api/auth', {
			method: 'POST',
			headers: {'Content-Type': 'application/json'},
			body: JSON.stringify({params: {username: cfg.user || 'admin', password: cfg.pass || ''}})
		}, 10000);
		if (!r.ok) {
			throw new Error('Autenticação falhou (HTTP ' + r.status + ').');
		}
		const token = (await r.json()).token;
		if (!token) {
			throw new Error('Resposta de autenticação sem token.');
		}
		sessionStorage.setItem(tokenKey, token);
		return token;
	}

	function isJpeg(buf) {
		const head = new Uint8Array(buf, 0, 3);
		// Magic bytes JPEG (FF D8 FF) — distingue imagem real de HTML/erro.
		return head[0] === 0xFF && head[1] === 0xD8 && head[2] === 0xFF;
	}

	// Dispara trigger.cgi. Retorna o ArrayBuffer do JPEG, ou null se token expirou.
	async function fetchTrigger(token) {
		const r = await fetchT(base + '/api/trigger.cgi', {
			headers: {Authorization: 'Bearer ' + token},
			cache: 'no-store'
		}, timeoutMs);
		if (r.status === 401) {
			return null; // token expirado
		}
		if (!r.ok) {
			throw new Error('Falha no trigger (HTTP ' + r.status + ').');
		}
		const buf = await r.arrayBuffer();
		if (!isJpeg(buf)) {
			return null; // não é JPEG → tratar como token inválido
		}
		return buf;
	}

	// Lê o maker note 'NDataComp' embutido no JPEG (pares campo=valor; separados por ';').
	function parseMeta(buf) {
		// Decodifica como latin1 para preservar offsets de bytes do texto ASCII.
		const bytes = new Uint8Array(buf);
		let txt = '';
		const CHUNK = 0x8000;
		for (let i = 0; i < bytes.length; i += CHUNK) {
			txt += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
		}

		const campo = (nome) => {
			const m = txt.match(new RegExp(nome + '=([\\x20-\\x7e]*?);'));
			return m ? m[1] : null;
		};

		let vehicles = [];
		const vl = txt.match(/VehicleList=(\[[\x20-\x7e]*?\]);/);
		if (vl) {
			try { vehicles = JSON.parse(vl[1]); }
			catch (e) { vehicles = []; }
		}

		return {
			placa: campo('Placa'),
			horario: campo('Horario'),
			vehicles: vehicles
		};
	}

	function renderMeta(data) {
		const rows = [];
		rows.push(row('Placa', data.placa ? '<b>' + escapeHtml(data.placa) + '</b>' : '—'));
		rows.push(row('Horário', escapeHtml(data.horario || '—')));

		const v = data.vehicles && data.vehicles[0];
		const tipo = v && v.classification && v.classification.type;
		if (tipo) {
			const p = tipo.prob != null ? ' (' + (tipo.prob * 100).toFixed(1) + '%)' : '';
			rows.push(row('Tipo veículo', escapeHtml(tipo.text || '—') + p));
		}
		else {
			rows.push(row('Tipo veículo', '—'));
		}

		const plate = v && v.plate;
		if (plate && plate.avgProb != null) {
			rows.push(row('Confiança placa', (plate.avgProb * 100).toFixed(2) + '%'));
		}
		else {
			rows.push(row('Confiança placa', '—'));
		}

		meta.innerHTML = '<table>' + rows.join('') + '</table>';
	}

	function row(k, v) {
		return '<tr><td class="k">' + k + '</td><td class="v">' + v + '</td></tr>';
	}

	function escapeHtml(s) {
		return String(s).replace(/[&<>"]/g, (c) =>
			({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'}[c]));
	}

	// Desenha a imagem no canvas (coords nativas) + retângulo do veículo.
	// O CSS (object-fit: contain) escala canvas e desenhos juntos.
	// A placa fica só nos metadados — sem desenho próprio.
	function draw(bitmap, data) {
		canvas.width = bitmap.width;
		canvas.height = bitmap.height;
		ctx.drawImage(bitmap, 0, 0);

		const v = data.vehicles && data.vehicles[0];
		if (!v) return;

		// Espessura proporcional à resolução para manter visível após escala.
		const lw = Math.max(2, Math.round(bitmap.width / 400));
		ctx.lineWidth = lw;
		ctx.font = (lw * 7) + 'px Arial';
		ctx.textBaseline = 'bottom';

		// Retângulo do veículo (verde). rect = [x, y, w, h].
		const cr = v.classification && v.classification.rect;
		if (cr && cr.length === 4) {
			ctx.strokeStyle = '#39d353';
			ctx.strokeRect(cr[0], cr[1], cr[2], cr[3]);
			const tipo = v.classification.type;
			if (tipo && tipo.text) {
				label(cr[0], cr[1], tipo.text, '#39d353', lw);
			}
		}
	}

	function label(x, y, text, color, lw) {
		const pad = lw * 2;
		const h = lw * 9;
		const w = ctx.measureText(text).width + pad * 2;
		const ty = y - lw / 2;
		ctx.fillStyle = color;
		ctx.fillRect(x - lw / 2, ty - h, w, h);
		ctx.fillStyle = '#000';
		ctx.fillText(text, x + pad - lw / 2, ty - lw);
	}

	function decode(buf) {
		const blob = new Blob([buf], {type: 'image/jpeg'});
		if (window.createImageBitmap) {
			return createImageBitmap(blob);
		}
		// Fallback via <img> + object URL.
		return new Promise((resolve, reject) => {
			const url = URL.createObjectURL(blob);
			const im = new Image();
			im.onload = () => { resolve(im); };
			im.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Falha ao decodificar JPEG.')); };
			im.src = url;
		});
	}

	// Exibe um JPEG (buffer) com metadados; marca a origem na barra.
	async function display(buf, origem) {
		const data = parseMeta(buf);
		renderMeta(data);

		const bitmap = await decode(buf);
		draw(bitmap, data);
		canvas.style.display = 'block';
		status.style.display = 'none';
		hasImage = true;

		const placa = data.placa ? ('placa: ' + data.placa) : 'sem placa';
		const quando = data.horario ? (' (' + data.horario + ')') : '';
		stamp.className = '';
		stamp.textContent = origem + quando + ' — ' + placa;
	}

	// ── Persistência no servidor (uma imagem por host, sempre sobrescrita) ──

	async function loadSaved() {
		if (!hostid) return false;
		try {
			const r = await fetchT(storeUrl, {cache: 'no-store'}, 10000);
			if (!r.ok) return false; // 404 = host ainda sem captura salva
			const buf = await r.arrayBuffer();
			if (!isJpeg(buf)) return false;
			await display(buf, 'Última captura salva');
			return true;
		}
		catch (e) {
			return false;
		}
	}

	async function saveToServer(buf) {
		if (!hostid) return;
		try {
			const r = await fetchT(storeUrl, {
				method: 'POST',
				headers: {'Content-Type': 'application/octet-stream'},
				body: buf
			}, 15000);
			const out = await r.json();
			if (!out.success) {
				console.warn('camera_trigger: falha ao salvar no servidor:', out.error);
			}
		}
		catch (e) {
			console.warn('camera_trigger: falha ao salvar no servidor:', e);
		}
	}

	// ── Ciclo de captura: loop até conseguir UMA imagem ──
	// Timeout (não passou veículo) → tenta de novo direto.
	// Outros erros (rede/auth) → espera 10 s antes de tentar de novo.

	async function captureOnce() {
		let token = sessionStorage.getItem(tokenKey);
		let buf = token ? await fetchTrigger(token) : null;

		if (buf === null) {
			token = await login();
			buf = await fetchTrigger(token);
		}
		if (buf === null) {
			throw new Error('Resposta não é JPEG mesmo após reautenticar.');
		}
		return buf;
	}

	const sleep = (ms) => new Promise((res) => setTimeout(res, ms));

	async function captureLoop() {
		if (busy) return;
		busy = true;

		let tentativa = 0;
		try {
			for (;;) {
				tentativa++;
				progress('Aguardando veículo… (tentativa ' + tentativa + ')', 'warn');
				try {
					const buf = await captureOnce();
					await display(buf, new Date().toLocaleTimeString());
					saveToServer(buf); // não bloqueia a exibição
					return;
				}
				catch (e) {
					if (e.name === 'AbortError') {
						// Timeout do trigger: não passou veículo — tenta de novo.
						progress('Timeout (sem veículo) — tentando de novo…', 'warn');
						await sleep(1000);
					}
					else {
						progress('Erro: ' + (e.message || e) + ' — nova tentativa em 10 s', 'error');
						await sleep(10000);
					}
				}
			}
		}
		finally {
			busy = false;
		}
	}

	// Fluxo principal: mostra a última salva imediatamente e já busca a próxima.
	(async () => {
		await loadSaved();
		if (!hasImage) {
			setStatus('Sem captura salva — aguardando veículo…', 'warn');
		}
		captureLoop();
	})();

	// Auto refresh opcional: re-executa o ciclo periodicamente (ignorado se ocupado).
	const interval = parseInt(cfg.refresh, 10) || 0;
	if (interval > 0) {
		setInterval(captureLoop, interval * 1000);
	}
})();
</script>
</body>
</html>
